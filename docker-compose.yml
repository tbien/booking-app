version: '3.9'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 12
  app:
    build: .
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/booking-app
      - SESSION_SECRET=${SESSION_SECRET:-booking-app-dev-secret-do-not-use-in-prod}
    ports:
      - '4000:4000'
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4000/health', res => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
volumes:
  mongo_data:
